name: Deploy Admin UI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy UI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/mrbike-admin-ui

            echo "Pulling latest UI code..."
            git fetch origin
            git reset --hard origin/main

            echo "Installing dependencies..."
            npm ci || npm install

            echo "Building React app..."
            npm run build

            echo "Updating nginx build folder..."
            rm -rf /var/www/admin/build
            cp -r build /var/www/admin/

            systemctl reload nginx